# Production Docker Compose for DeepFix Server


services:
  # ===================
  # Reverse Proxy
  # ===================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - deepfix-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      - "traefik.enable=true"

  # ===================
  # DeepFix Server
  # ===================
  deepfix-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepfix-server:latest
    container_name: deepfix-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./server_logs:/logs
      - ./server_mlflow_data:/mlflow
    networks:
      - deepfix-network
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 8844)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deepfix.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.deepfix.entrypoints=websecure"
      - "traefik.http.routers.deepfix.tls=true"
      - "traefik.http.routers.deepfix.middlewares=rate-limit@file"
      - "traefik.http.services.deepfix.loadbalancer.server.port=8844"
      - "traefik.http.services.deepfix.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.deepfix.loadbalancer.healthcheck.interval=30s"

  # ===================
  # DeepFix Portal
  # ===================
  deepfix-portal:
    build:
      context: ./deepfix-portal
      dockerfile: Dockerfile
    image: deepfix-portal:latest
    container_name: deepfix-portal
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - POSTGRES_DB=deepfix_portal
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - deepfix-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`localhost`) && PathPrefix(`/`)"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.routers.portal.tls=true"
      - "traefik.http.services.portal.loadbalancer.server.port=5041"

  # ===================
  # MLflow Server
  # ===================
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: mlflow:psycopg2-3.6.0
    container_name: mlflow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts mlflow:5000,localhost:5000,localhost,mlflow,172.20.0.0/16
    volumes:
      - ./server_data/mlflow:/mlflow
    networks:
      - deepfix-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=Host(`localhost`) && PathPrefix(`/mlflow`)"
      - "traefik.http.routers.mlflow.entrypoints=websecure"
      - "traefik.http.routers.mlflow.tls=true"
      - "traefik.http.routers.mlflow.middlewares=mlflow-strip@file"
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"

  # ===================
  # PostgreSQL Database
  # ===================
  postgres:
    image: postgres:16.11-alpine3.23
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./server_data/postgres:/var/lib/postgresql/data
    networks:
      - deepfix-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # Jaeger Tracing
  # ===================
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.13.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
    environment:
      - LOG_LEVEL=debug
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - ./server_data/badger:/badger
    networks:
      - deepfix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaeger.rule=Host(`localhost`) && PathPrefix(`/jaeger`)"
      - "traefik.http.routers.jaeger.entrypoints=websecure"
      - "traefik.http.routers.jaeger.tls=true"
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"

# ===================
# Networks
# ===================
networks:
  deepfix-network:
    driver: bridge
    name: deepfix-network

