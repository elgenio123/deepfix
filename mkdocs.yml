site_name: DeepFix Documentation
site_description: AI agent assistant for diagnosing ML bugs and providing prioritized solutions
site_author: DeepFix Team
site_url: https://delcaux-labs.github.io/deepfix/

repo_name: delcaux-labs/deepfix
repo_url: https://github.com/delcaux-labs/deepfix
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 DeepFix Team

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - mkdocstrings:
      handlers:
        python:
          paths: [deepfix-sdk/src, deepfix-server/src, deepfix-core/src]
          selection:
            docstring_style: google
          rendering:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/installation.md
    - getting-started/quickstart.md
    - getting-started/configuration.md
  - Guides:
    - guides/image-classification.md
    - guides/tabular-data.md
    - guides/nlp-datasets.md
    - guides/mlflow-integration.md
  - API Reference:
    - API Overview: api-reference/index.md
    - SDK: api-reference/sdk/index.md
    - Server: api-reference/server/index.md
    - Core: api-reference/core/index.md
  - Architecture:
    - architecture/overview.md
    - architecture/client-server.md
    - architecture/agents.md
  - Deployment:
    - deployment/docker.md
    - deployment/local-setup.md
  - Contributing:
    - contributing/guidelines.md
    - contributing/development.md

