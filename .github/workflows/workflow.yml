name: Publish to TestPyPI

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  detect-deepfix-sdk-changes:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect deepfix-sdk changes
        id: detect
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --quiet HEAD^ HEAD -- deepfix-sdk; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  publish-testpypi:
    needs: detect-deepfix-sdk-changes
    if: needs.detect-deepfix-sdk-changes.outputs.should-run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build deepfix-core
        run: uv build --no-sources --package deepfix-core

      - name: Build deepfix-sdk
        run: uv build --no-sources --package deepfix-sdk

      - name: Build deepfix (meta package)
        run: uv build --no-sources

      - name: Publish deepfix (meta package) to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TEST_TOKEN }}
        run: uv publish --index testpypi
