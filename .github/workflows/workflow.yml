name: Publish to TestPyPI

on:
  push:
    branches:
      - main

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build deepfix-core
        run: uv build --no-sources --package deepfix-core

      - name: Build deepfix-sdk
        run: uv build --no-sources --package deepfix-sdk

      - name: Build deepfix (meta package)
        run: uv build --no-sources

      - name: Publish deepfix (meta package) to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TEST_TOKEN }}
        run: uv publish --index testpypi

