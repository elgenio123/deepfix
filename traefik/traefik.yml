# Traefik Static Configuration for DeepFix Production

# Global configuration
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# API and Dashboard
api:
  dashboard: true
  insecure: false

# Logging
log:
  level: INFO
  format: json

# Access logs
accessLog:
  format: json
  filters:
    statusCodes:
      - "200-299"
      - "400-499"
      - "500-599"
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
    headers:
      defaultMode: keep
      names:
        User-Agent: keep
        Authorization: drop
        Content-Type: keep

# Entry points
entryPoints:
  web:
    address: ":80"


  websecure:
    address: ":443"
    http:
      tls: {}

  metrics:
    address: ":8080"

# Providers
providers:
  # Docker provider for auto-discovery
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: deepfix-network
    watch: true

  # File provider for dynamic configuration
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Metrics for Prometheus
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

# Health check
ping:
  entryPoint: web

