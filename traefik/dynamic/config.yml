# Traefik Dynamic Configuration
# Rate limiting, TLS, and middleware definitions

http:
  # Middlewares
  middlewares:
    # Rate limiting middleware - 2 requests per minute per IP
    rate-limit:
      rateLimit:
        average: 2
        burst: 50
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Security headers
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          Server: ""

    # Compress responses
    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

    # Strip prefix for MLflow
    mlflow-strip:
      stripPrefix:
        prefixes:
          - "/mlflow"

    # Retry middleware for resilience
    retry:
      retry:
        attempts: 3
        initialInterval: 100ms

    # Circuit breaker for fault tolerance
    circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.5 || ResponseCodeRatio(500, 600, 0, 600) > 0.5"
        checkPeriod: 10s
        fallbackDuration: 30s
        recoveryDuration: 60s

    # Request size limit (10MB)
    request-size:
      buffering:
        maxRequestBodyBytes: 10485760

    # Dashboard authentication (basic auth)
    # Default: admin/admin (change in production!)
    # Generated with: htpasswd -nb admin admin
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/"

  # Routers (additional to docker labels)
  routers:
    # Dashboard router (protected)
    dashboard:
      rule: "Host(`localhost`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      entryPoints:
        - websecure
      service: api@internal
      tls: {}
      middlewares:
        - dashboard-auth

# TLS Configuration
tls:
  # Default certificate
  certificates:
    - certFile: /etc/traefik/certs/server.crt
      keyFile: /etc/traefik/certs/server.key

  # TLS options
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: false
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      curvePreferences:
        - CurveP521
        - CurveP384
    
    # Strict TLS 1.3 only option
    modern:
      minVersion: VersionTLS13

