services:


  tunnel:
    image: cloudflare/cloudflared:1811-8aebc38b2fc4
    container_name: tunnel-deepfix
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
  
  deepfix-portal:
    build:
      context: .
      dockerfile: ./packages/deepfix-portal/Dockerfile
    image: deepfix-portal:latest
    restart: unless-stopped
    ports:
      - "3000:5041"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://deepfix-admin:deepfix-admin@deepfix-db:5432/deepfix_portal
      - DEEPFIX_SERVER_URL=http://deepfix-server:8844
      - ENVIRONMENT=development
    depends_on:
      - deepfix-server
      - deepfix-db

  deepfix-server:
    build:
      context: .
      dockerfile: ./packages/deepfix-server/Dockerfile
    image: deepfix-server:latest
    env_file:
      - .env
    environment:
      - DEEPFIX_SERVER_DATABASE_URL=sqlite:////app/.deepfix/deepfix_server.db
    restart: unless-stopped
    command: ["deepfix-server", "launch", "-port", "8844", "-host", "0.0.0.0", "-workers", "1", "--reload"]
    ports:
      - "8844:8844"
    develop:
      watch:
        - action: sync
          path: ./packages/deepfix-server/src
          target: /app/packages/deepfix-server/src
        - action: sync
          path: ./packages/deepfix-core/src
          target: /app/packages/deepfix-core/src
        - action: sync
          path: ./packages/deepfix-kb/src
          target: /app/packages/deepfix-kb/src
        - action: rebuild
          path: ./packages/deepfix-server/pyproject.toml
        - action: rebuild
          path: ./packages/deepfix-core/pyproject.toml
        - action: rebuild
          path: ./packages/deepfix-kb/pyproject.toml

  deepfix-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: deepfix-admin
      POSTGRES_PASSWORD: deepfix-admin
      POSTGRES_DB: deepfix_portal
    ports:
      - "5444:5432"
    volumes:
      - ./server_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepfix-admin -d deepfix_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
