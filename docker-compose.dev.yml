services:

  # ===================
  # Reverse Proxy
  # ===================
  traefik:
    image: traefik:v3.0
    container_name: traefik-deepfix
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - deepfix-network
    labels:
      - "traefik.enable=true"

  # ===================
  # Pinggy Tunnel
  # ===================
  pinggy:
    image: alpine:latest
    container_name: pinggy
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c "apk add --no-cache openssh-client && ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R0:traefik:80 $${PINGGY_SSH_USER}@pro.pinggy.io"
    networks:
      - deepfix-network
    depends_on:
      - traefik

  # ===================
  # DeepFix Portal Frontend
  # ===================
  deepfix-portal:
    build:
      context: ./packages/deepfix-portal
      dockerfile: Dockerfile.frontend
    image: deepfix-portal:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - deepfix-network
    volumes:
      - ./packages/deepfix-portal/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - deepfix-portal-api
      - traefik
      - pinggy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deepfix-portal.rule=Host(`localhost`)"
      - "traefik.http.routers.deepfix-portal.entrypoints=web,websecure"
      - "traefik.http.routers.deepfix-portal.tls=true"
      - "traefik.http.routers.deepfix-portal.priority=1"
      - "traefik.http.services.deepfix-portal.loadbalancer.server.port=3000"
      - "traefik.http.routers.deepfix-portal-http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.deepfix-portal-http.entrypoints=web"
      - "traefik.http.routers.deepfix-portal-http.priority=1"

  # ===================
  # DeepFix Portal API (Backend)
  # ===================
  deepfix-portal-api:
    build:
      context: .
      dockerfile: ./packages/deepfix-portal/Dockerfile.backend
    image: deepfix-portal-api:latest
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${SUPABASE_USER}:${SUPABASE_PASSWORD}@${SUPABASE_HOST}:6543/postgres
      - FRONTEND_URL=http://deepfix-portal:3000
      - ENVIRONMENT=development
    restart: unless-stopped
    networks:
      - deepfix-network
    depends_on:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deepfix-portal-api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.deepfix-portal-api.entrypoints=web,websecure"
      - "traefik.http.routers.deepfix-portal-api.tls=true"
      - "traefik.http.routers.deepfix-portal-api.priority=100"
      - "traefik.http.services.deepfix-portal-api.loadbalancer.server.port=5041"
      - "traefik.http.routers.deepfix-portal-api-http.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.deepfix-portal-api-http.entrypoints=web"
      - "traefik.http.routers.deepfix-portal-api-http.priority=100"

# ===================
# Networks
# ===================
networks:
  deepfix-network:
    driver: bridge
    name: deepfix-network
