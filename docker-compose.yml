
services:

  deepfix-server:
    build:
      context: .
      dockerfile: deepfix-server/Dockerfile
    image: deepfix-server:latest
    ports:
      - "8844:8844"
    env_file:
      - .env
    environment:
      # Use same database as deepfix-portal for shared request_logs table
      - DEEPFIX_SERVER_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/deepfix_portal
    volumes:
      - ./server_data/logs:/logs
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy

  deepfix-portal:
    build:
      context: .
      dockerfile: deepfix-portal/Dockerfile
    image: deepfix-portal:latest
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Hardcode database name to ensure consistency with deepfix-server
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/deepfix_portal
    ports:
      - "5041:5041"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: mlflow:psycopg2-3.6.0
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost:5000,localhost,mlflow:5000
    volumes:
      - ./server_data/mlflow:/mlflow
    depends_on:
      postgres:
        condition: service_healthy

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.13.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
    environment:
      - LOG_LEVEL=debug
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - ./server_data/badger:/badger
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16.11-alpine3.23
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./server_data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

