
services:

  # ===================
  # Reverse Proxy
  # ===================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - deepfix-network
    labels:
      - "traefik.enable=true"

  # ===================
  # DeepFix Server
  # ===================
  deepfix-server:
    build:
      context: .
      dockerfile: deepfix-server/Dockerfile
    image: deepfix-server:latest
    env_file:
      - .env
    networks:
      - deepfix-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deepfix-server.rule=Host(`localhost`) && PathPrefix(`/server`)"
      - "traefik.http.routers.deepfix-server.entrypoints=web,websecure"
      - "traefik.http.routers.deepfix-server.tls=true"
      - "traefik.http.routers.deepfix-server.priority=100"
      - "traefik.http.services.deepfix-server.loadbalancer.server.port=8844"

  # ===================
  # DeepFix Portal Frontend
  # ===================
  deepfix-portal:
    build:
      context: .
      dockerfile: deepfix-portal/Dockerfile.frontend
    image: deepfix-portal:latest
    #ports:
    #  - "3000:3000"
    restart: unless-stopped
    networks:
      - deepfix-network
    volumes:
      - ./deepfix-portal/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - deepfix-portal-api
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deepfix-portal.rule=Host(`localhost`)"
      - "traefik.http.routers.deepfix-portal.entrypoints=web,websecure"
      - "traefik.http.routers.deepfix-portal.tls=true"
      - "traefik.http.routers.deepfix-portal.priority=1"
      - "traefik.http.services.deepfix-portal.loadbalancer.server.port=3000"

  # ===================
  # DeepFix Portal API (Backend)
  # ===================
  deepfix-portal-api:
    build:
      context: .
      dockerfile: deepfix-portal/Dockerfile.backend
    image: deepfix-portal-api:latest
    env_file:
      - .env
    #ports:
    #  - "5041:5041"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/deepfix_portal
    restart: unless-stopped
    networks:
      - deepfix-network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deepfix-portal-api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.deepfix-portal-api.entrypoints=web,websecure"
      - "traefik.http.routers.deepfix-portal-api.tls=true"
      - "traefik.http.routers.deepfix-portal-api.priority=100"
      - "traefik.http.services.deepfix-portal-api.loadbalancer.server.port=5041"

  # ===================
  # MLflow Server
  # ===================
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: mlflow:psycopg2-3.6.0
    container_name: mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost:5000,localhost,mlflow:5000
    volumes:
      - ./server_data/mlflow:/mlflow
    networks:
      - deepfix-network
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlflow.rule=Host(`localhost`) && PathPrefix(`/mlflow`)"
      - "traefik.http.routers.mlflow.entrypoints=web,websecure"
      - "traefik.http.routers.mlflow.tls=true"
      - "traefik.http.routers.mlflow.priority=100"
      - "traefik.http.services.mlflow.loadbalancer.server.port=5000"

  # ===================
  # Jaeger Tracing
  # ===================
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.13.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
    environment:
      - LOG_LEVEL=debug
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - ./server_data/badger:/badger
    networks:
      - deepfix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaeger.rule=Host(`localhost`) && PathPrefix(`/jaeger`)"
      - "traefik.http.routers.jaeger.entrypoints=web,websecure"
      - "traefik.http.routers.jaeger.tls=true"
      - "traefik.http.routers.jaeger.priority=100"
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"

  # ===================
  # PostgreSQL Database
  # ===================
  postgres:
    image: postgres:16.11-alpine3.23
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./server_data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - deepfix-network
    healthcheck:
      # Explicitly check a known database to avoid noisy "database <user> does not exist"
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

# ===================
# Networks
# ===================
networks:
  deepfix-network:
    driver: bridge
    name: deepfix-network
