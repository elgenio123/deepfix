
services:

  deepfix-server:
    build: .
    image: deepfix-server:latest
    ports:
      - "8844:8844"
    env_file:
      - .env
    volumes:
      - ./server_logs:/logs
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy

  deepfix-portal:
    build:
      context: ./deepfix-portal
      dockerfile: Dockerfile
    image: deepfix-portal:latest
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - POSTGRES_DB=deepfix_portal
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "5041:5041"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: mlflow:psycopg2-3.6.0
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - POSTGRES_DB=mlflow
    env_file:
      - .env
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost:5000,localhost,mlflow:5000
    volumes:
      - ./server_data/mlflow:/mlflow
    depends_on:
      postgres:
        condition: service_started

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.13.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
    environment:
      - LOG_LEVEL=debug
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - ./server_data/badger:/badger
    restart: unless-stopped

  postgres:
    image: postgres:16.11-alpine3.23
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./server_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cursor-agent:
    build: ./cursor_wrapper
    image: cursor-agent:latest
    ports:
      - "8841:8841"
    env_file:
      - cursor_wrapper/.env
    environment:
      - CURSOR_MODEL_NAME=gpt-5.1-codex-max
    volumes:
      - ./server_data/cursor_agent:/logs
    restart: unless-stopped
