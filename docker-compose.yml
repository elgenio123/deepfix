services:


  # ===================
  # Tunnel
  # ===================
  tunnel:
    image: cloudflare/cloudflared:1811-8aebc38b2fc4
    container_name: tunnel-deepfix
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - deepfix-network
    deploy:
      resources:
        limits:
          cpus: '0.25'

  # ===================
  # DeepFix Portal (Unified)
  # ===================
  deepfix-portal:
    build:
      context: .
      dockerfile: ./packages/deepfix-portal/Dockerfile
    image: deepfix-portal:latest
    restart: unless-stopped
    networks:
      - deepfix-network
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://deepfix-admin:deepfix-admin@deepfix-db:5432/deepfix_portal
      - FRONTEND_URL=https://${HOST}
      - DEEPFIX_SERVER_URL=http://deepfix-server:8844
      - ENVIRONMENT=production
    depends_on:
      - tunnel
      - deepfix-server
      - deepfix-db
    deploy:
      resources:
        limits:
          cpus: '2.50'

  # ===================
  # DeepFix Server (Analysis Engine)
  # ===================
  deepfix-server:
    build:
      context: .
      dockerfile: ./packages/deepfix-server/Dockerfile
    image: deepfix-server:latest
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - deepfix-network
    deploy:
      resources:
        limits:
          cpus: '2.00'

  # ===================
  # Database
  # ===================
  deepfix-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: deepfix-admin
      POSTGRES_PASSWORD: deepfix-admin
      POSTGRES_DB: deepfix_portal
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deepfix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepfix-admin -d deepfix_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

# ===================
# Networks
# ===================
networks:
  deepfix-network:
    driver: bridge
    name: deepfix-network

volumes:
  postgres_data:
