
services:

  deepfix-server:
    build: .
    image: deepfix-server:latest
    ports:
      - "8844:8844"
    env_file:
      - .env
    volumes:
      - ./server_logs:/logs
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
      jaeger:
        condition: service_started

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.6.0
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost:5000,localhost,mlflow:5000
    volumes:
      - ./server_mlflow_data:/mlflow

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.13.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
    environment:
      - LOG_LEVEL=debug
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - ./server_logs/badger:/badger
    restart: unless-stopped

