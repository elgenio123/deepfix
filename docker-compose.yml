services:

  # ===================
  # Reverse Proxy
  # ===================
  proxy-deepfix:
    image: traefik:v3.6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    #ports:
    #  - "80:80"
    #  - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - deepfix-network
    labels:
      - "traefik.enable=true"
    deploy:
      resources:
        limits:
          cpus: '0.25'

  # ===================
  # Tunnel
  # ===================
  tunnel:
    image: cloudflare/cloudflared:1811-8aebc38b2fc4
    container_name: tunnel-deepfix
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - proxy-deepfix
    restart: unless-stopped
    networks:
      - deepfix-network
    deploy:
      resources:
        limits:
          cpus: '0.25'

  # ===================
  # DeepFix Portal (Unified)
  # ===================
  deepfix-portal:
    build:
      context: .
      dockerfile: ./packages/deepfix-portal/Dockerfile
    image: deepfix-portal:latest
    restart: unless-stopped
    networks:
      - deepfix-network
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${SUPABASE_USER}:${SUPABASE_PASSWORD}@${SUPABASE_HOST}:6543/postgres
      - FRONTEND_URL=https://${HOST}
      - DEEPFIX_SERVER_URL=http://deepfix-server:8844
      - ENVIRONMENT=production
    depends_on:
      - proxy-deepfix
      - tunnel
      - deepfix-server
    deploy:
      resources:
        limits:
          cpus: '2.50'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deepfix-portal.rule=Host(`${HOST}`)"
      - "traefik.http.routers.deepfix-portal.entrypoints=web,websecure"
      - "traefik.http.routers.deepfix-portal.tls=true"
      - "traefik.http.services.deepfix-portal.loadbalancer.server.port=5041"

  # ===================
  # DeepFix Server (Analysis Engine)
  # ===================
  deepfix-server:
    build:
      context: .
      dockerfile: ./packages/deepfix-server/Dockerfile
    image: deepfix-server:latest
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - deepfix-network
    deploy:
      resources:
        limits:
          cpus: '2.00'

# ===================
# Networks
# ===================
networks:
  deepfix-network:
    driver: bridge
    name: deepfix-network
