repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: \.(bat|ps1)$
      - id: end-of-file-fixer
        exclude: \.(bat|ps1)$
      - id: trailing-whitespace
        exclude: \.(bat|ps1)$

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (uvx, check)
        entry: uvx ruff format
        language: system
        types_or: [python, pyi]
